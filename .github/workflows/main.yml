name: Deploy Terraform Resources

on: 
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  GitHub_Token: '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'

permissions:
  actions: write
  issues: read
  contents: read
  pull-requests: read
  id-token: write

jobs:
  Terraform:
    name: "Terraform Init"
    runs-on: ubuntu-latest
  
    environment: production
    steps:
      - name: Checkout Self
        uses: actions/checkout@v6.0.2
        with:
          repository:  ${{ github.repository }}
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v2.0.3
        with:
          terraform_version: latest
      - name: Terraform fmt
        id: fmt
        run: terraform fmt
      - name: Terraform Init
        id: init
        run: terraform init
        
  TerraformValidate:
     name: Terraform validate
     runs-on: ubuntu-latest
   
     environment: production
     steps:
       - name:  Checkout Self
         uses: actions/checkout@v6.0.2
         with:
           repository:  ${{ github.repository }}
       - name: Install Terraform
         uses: hashicorp/setup-terraform@v2.0.3
         with:
           terraform_version: latest
       - name: Terraform Init
         run: terraform init
       - name: Terraform Validate
         id: validate
         run: terraform validate -no-color
         
 
    
     
       - name: Run TFLint
         run: tflint -f compact
    
